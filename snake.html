<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .section {
      margin-top: 0;
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
    }

    .snake-shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 0;
      display: grid;
      gap: 0.85rem;
      justify-items: center;
    }

    .snake-topline {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: center;
      width: 100%;
      color: #e5e7eb;
      font-weight: 600;
    }

    .snake-topline a {
      display: inline-flex;
      align-items: center;
      justify-self: start;
      align-self: center;
      width: fit-content;
      text-decoration: none;
      color: #f3f4f6;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 999px;
      padding: 0.32rem 0.8rem;
      background: rgba(255, 255, 255, 0.04);
    }

    .snake-score-block {
      display: grid;
      gap: 0.25rem;
      justify-items: end;
      justify-self: end;
    }

    .snake-status {
      color: #d1d5db;
      font-size: 0.95rem;
      text-align: center;
      min-height: 1.3rem;
    }

    .snake-board {
      width: min(67.5vw, 570px);
      aspect-ratio: 1 / 1;
      border-radius: 0.9rem;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #0a0d12;
      image-rendering: auto;
      display: block;
    }

    .mobile-controls {
      display: none;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 0.55rem;
      justify-content: center;
      align-content: center;
      margin-top: 0.25rem;
      user-select: none;
    }

    .mobile-btn {
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 0.75rem;
      background: rgba(255, 255, 255, 0.06);
      color: #f3f4f6;
      font-size: 1.1rem;
      font-weight: 700;
      display: grid;
      place-items: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .mobile-btn:active {
      background: rgba(176, 42, 55, 0.7);
      border-color: rgba(176, 42, 55, 0.85);
    }

    .mobile-btn-start {
      font-size: 0.8rem;
      letter-spacing: 0.02em;
    }

    .mobile-up { grid-column: 2; grid-row: 1; }
    .mobile-left { grid-column: 1; grid-row: 2; }
    .mobile-start { grid-column: 2; grid-row: 2; }
    .mobile-right { grid-column: 3; grid-row: 2; }
    .mobile-down { grid-column: 2; grid-row: 3; }

    .snake-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: grid;
      place-items: center;
      z-index: 20;
      padding: 1rem;
    }

    .snake-modal[hidden] {
      display: none;
    }

    .snake-modal-card {
      width: min(92vw, 420px);
      background: #101721;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 1rem;
      padding: 1rem;
      color: #f3f4f6;
      display: grid;
      gap: 0.65rem;
    }

    .snake-modal-card h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .snake-modal-score {
      margin: 0;
      color: #cbd5e1;
    }

    .snake-modal-card input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: #0a0d12;
      color: #f8fafc;
      border-radius: 0.7rem;
      padding: 0.6rem 0.75rem;
      font-size: 1rem;
    }

    .snake-modal-card button,
    .snake-leaderboard button {
      border: 1px solid rgba(196, 48, 63, 0.8);
      background: #c4303f;
      color: #fff;
      border-radius: 0.7rem;
      padding: 0.55rem 0.8rem;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .snake-modal-card button[disabled] {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .snake-modal-error {
      margin: 0;
      min-height: 1.2rem;
      color: #fca5a5;
      font-size: 0.9rem;
    }

    .snake-leaderboard {
      width: min(92vw, 540px);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 1rem;
      background: rgba(10, 13, 18, 0.92);
      color: #e5e7eb;
      padding: 0.9rem 1rem;
      display: grid;
      gap: 0.6rem;
    }

    .snake-leaderboard[hidden] {
      display: none;
    }

    .snake-leaderboard h2 {
      margin: 0;
      font-size: 1.1rem;
      text-align: center;
    }

    .snake-leaderboard ol {
      list-style: none;
      margin: 0;
      padding-left: 0;
      display: grid;
      gap: 0.35rem;
    }

    .snake-leaderboard li {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-variant-numeric: tabular-nums;
    }

    .snake-leader-name {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      min-width: 0;
    }

    .snake-leader-medal {
      width: 1.3rem;
      text-align: center;
      flex: 0 0 auto;
    }

    .snake-leaderboard-status {
      margin: 0;
      min-height: 1.2rem;
      color: #cbd5e1;
      font-size: 0.9rem;
    }

    @media (hover: none) and (pointer: coarse) {
      .mobile-controls {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="section">
      <div class="snake-shell">
        <div class="snake-topline">
          <a href="index.html">← Back</a>
          <span>Snake</span>
          <span class="snake-score-block">
            <span id="scoreText">Score: 0</span>
            <span id="timeText">Time Elapsed: 0:00</span>
          </span>
        </div>
        <p id="statusText" class="snake-status">Press Space Bar to Start.</p>
        <canvas id="snakeCanvas" class="snake-board" width="500" height="500" aria-label="Snake game board"></canvas>
        <div class="mobile-controls" aria-label="Mobile controls">
          <button class="mobile-btn mobile-up" type="button" data-mobile-dir="up" aria-label="Move up">↑</button>
          <button class="mobile-btn mobile-left" type="button" data-mobile-dir="left" aria-label="Move left">←</button>
          <button class="mobile-btn mobile-start mobile-btn-start" type="button" data-mobile-start aria-label="Start game">START</button>
          <button class="mobile-btn mobile-right" type="button" data-mobile-dir="right" aria-label="Move right">→</button>
          <button class="mobile-btn mobile-down" type="button" data-mobile-dir="down" aria-label="Move down">↓</button>
        </div>
      </div>
    </section>
  </div>
  <div id="nameModal" class="snake-modal" hidden>
    <form id="nameForm" class="snake-modal-card" novalidate>
      <h2>Game Over</h2>
      <p id="finalScoreText" class="snake-modal-score"></p>
      <label for="playerNameInput">Enter your name</label>
      <input id="playerNameInput" name="playerName" type="text" maxlength="20" autocomplete="nickname" required />
      <button id="submitScoreButton" type="submit">Submit Score</button>
      <p id="nameError" class="snake-modal-error"></p>
    </form>
  </div>
  <div id="leaderboardModal" class="snake-modal" hidden>
    <section class="snake-leaderboard" aria-live="polite">
      <h2>Top Ten of All Time</h2>
      <ol id="leaderboardList"></ol>
      <p id="leaderboardStatus" class="snake-leaderboard-status"></p>
      <button id="playAgainButton" type="button">Play Again</button>
    </section>
  </div>
  <script src="config.js"></script>
  <script>
    (function () {
      var BOARD_SIZE = 50;
      var CELL_SIZE = 10;
      var TICK_MS = 85;
      var HEAD_SCALE = 5.2;
      var LEADERBOARD_LIMIT = 10;

      var canvas = document.getElementById('snakeCanvas');
      var ctx = canvas.getContext('2d');
      var statusText = document.getElementById('statusText');
      var scoreText = document.getElementById('scoreText');
      var timeText = document.getElementById('timeText');
      var nameModal = document.getElementById('nameModal');
      var nameForm = document.getElementById('nameForm');
      var finalScoreText = document.getElementById('finalScoreText');
      var playerNameInput = document.getElementById('playerNameInput');
      var nameError = document.getElementById('nameError');
      var submitScoreButton = document.getElementById('submitScoreButton');
      var leaderboardModal = document.getElementById('leaderboardModal');
      var leaderboardList = document.getElementById('leaderboardList');
      var leaderboardStatus = document.getElementById('leaderboardStatus');
      var playAgainButton = document.getElementById('playAgainButton');

      var headImage = new Image();
      headImage.src = 'assets/img/snake-head.svg';

      var snake = [];
      var direction = { x: 1, y: 0 };
      var queuedDirection = { x: 1, y: 0 };
      var food = null;
      var running = false;
      var gameOver = false;
      var score = 0;
      var lastTick = 0;
      var rafId = null;
      var elapsedMs = 0;
      var startMs = null;
      var scoreSubmittedForRound = false;
      var supabaseClient = null;

      function initializeSupabase() {
        var config = window.siteConfig && window.siteConfig.supabase;
        if (!config || !config.url || !config.anonKey || !window.supabase || !window.supabase.createClient) {
          return null;
        }
        return window.supabase.createClient(config.url, config.anonKey);
      }

      function leaderboardTable() {
        var config = window.siteConfig && window.siteConfig.supabase;
        return (config && config.snakeLeaderboardTable) || 'snake';
      }

      function isAnyModalOpen() {
        return !nameModal.hidden || !leaderboardModal.hidden;
      }

      function snakeSubmitFunctionName() {
        var config = window.siteConfig && window.siteConfig.supabase;
        return (config && config.snakeSubmitFunction) || 'snake-submit-score';
      }

      function formatElapsed(ms) {
        var totalSeconds = Math.floor(ms / 1000);
        var minutes = Math.floor(totalSeconds / 60);
        var seconds = totalSeconds % 60;
        return minutes + ':' + String(seconds).padStart(2, '0');
      }

      function formatLeaderboardDate(value) {
        if (!value) return null;
        var date = new Date(value);
        if (isNaN(date.getTime())) return null;
        return date.toLocaleDateString('en-US', {
          month: 'short',
          day: 'numeric',
          year: 'numeric'
        });
      }

      function renderElapsed() {
        timeText.textContent = 'Time Elapsed: ' + formatElapsed(elapsedMs);
      }

      function resetGameState() {
        snake = [];
        var startX = 15;
        var startY = 25;
        for (var i = 0; i < 5; i += 1) {
          snake.push({ x: startX - i, y: startY });
        }
        direction = { x: 1, y: 0 };
        queuedDirection = { x: 1, y: 0 };
        score = 0;
        scoreText.textContent = 'Score: ' + score;
        elapsedMs = 0;
        startMs = null;
        renderElapsed();
        gameOver = false;
        scoreSubmittedForRound = false;
        nameModal.hidden = true;
        leaderboardModal.hidden = true;
        nameError.textContent = '';
        leaderboardStatus.textContent = '';
        placeFood();
      }

      function cleanName(name) {
        return name.trim().replace(/\s+/g, ' ');
      }

      function isValidName(name) {
        return /^[a-zA-Z0-9 _.-]{2,20}$/.test(name);
      }

      function endGame() {
        gameOver = true;
        running = false;
        if (startMs !== null) {
          elapsedMs = performance.now() - startMs;
          renderElapsed();
        }
        statusText.textContent = 'Game over. Submit your score.';
        if (!scoreSubmittedForRound) {
          scoreSubmittedForRound = true;
          finalScoreText.textContent = 'Score: ' + score + ' | Time: ' + formatElapsed(elapsedMs);
          playerNameInput.value = '';
          nameError.textContent = '';
          nameModal.hidden = false;
          setTimeout(function () {
            playerNameInput.focus();
          }, 0);
        }
      }

      function sameCell(a, b) {
        return a.x === b.x && a.y === b.y;
      }

      function placeFood() {
        var candidate;
        do {
          candidate = {
            x: Math.floor(Math.random() * BOARD_SIZE),
            y: Math.floor(Math.random() * BOARD_SIZE)
          };
        } while (snake.some(function (segment) { return sameCell(segment, candidate); }));
        food = candidate;
      }

      function setDirection(next) {
        if (!running) return;
        if (next.x === -direction.x && next.y === -direction.y) return;
        queuedDirection = next;
      }

      function advance() {
        direction = queuedDirection;
        var currentHead = snake[0];
        var newHead = {
          x: currentHead.x + direction.x,
          y: currentHead.y + direction.y
        };

        if (newHead.x < 0 || newHead.x >= BOARD_SIZE || newHead.y < 0 || newHead.y >= BOARD_SIZE) {
          endGame();
          return;
        }

        if (snake.some(function (segment) { return sameCell(segment, newHead); })) {
          endGame();
          return;
        }

        snake.unshift(newHead);

        if (sameCell(newHead, food)) {
          score += 1;
          scoreText.textContent = 'Score: ' + score;
          placeFood();
        } else {
          snake.pop();
        }
      }

      function drawBoard() {
        ctx.fillStyle = '#0a0d12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = 'rgba(148, 163, 184, 0.10)';
        ctx.lineWidth = 1;
        for (var i = 0; i <= BOARD_SIZE; i += 10) {
          var pos = i * CELL_SIZE;
          ctx.beginPath();
          ctx.moveTo(pos, 0);
          ctx.lineTo(pos, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, pos);
          ctx.lineTo(canvas.width, pos);
          ctx.stroke();
        }

        ctx.fillStyle = '#c4303f';
        ctx.fillRect(food.x * CELL_SIZE, food.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);

        for (var s = snake.length - 1; s >= 1; s -= 1) {
          var segment = snake[s];
          ctx.fillStyle = '#f3f4f6';
          ctx.fillRect(segment.x * CELL_SIZE, segment.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }

        var head = snake[0];
        var hx = head.x * CELL_SIZE;
        var hy = head.y * CELL_SIZE;

        if (headImage.complete && headImage.naturalWidth > 0) {
          var headSize = CELL_SIZE * HEAD_SCALE;
          var headOffset = (headSize - CELL_SIZE) / 2;
          var dx = hx - headOffset;
          var dy = hy - headOffset;
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(headImage, dx, dy, headSize, headSize);
        } else {
          ctx.fillStyle = '#f3f4f6';
          ctx.fillRect(hx, hy, CELL_SIZE, CELL_SIZE);
        }
      }

      function gameLoop(timestamp) {
        if (!lastTick) lastTick = timestamp;
        if (running && startMs !== null) {
          elapsedMs = timestamp - startMs;
          renderElapsed();
        }
        if (running && timestamp - lastTick >= TICK_MS) {
          lastTick = timestamp;
          advance();
        }
        drawBoard();
        rafId = requestAnimationFrame(gameLoop);
      }

      function startGame() {
        if (isAnyModalOpen()) return;
        if (gameOver) {
          resetGameState();
        }
        if (!running) {
          running = true;
          startMs = performance.now() - elapsedMs;
          statusText.textContent = 'Use Arrow Keys or WASD to move.';
        }
      }

      function directionFromName(name) {
        if (name === 'up') return { x: 0, y: -1 };
        if (name === 'down') return { x: 0, y: 1 };
        if (name === 'left') return { x: -1, y: 0 };
        if (name === 'right') return { x: 1, y: 0 };
        return null;
      }

      document.addEventListener('keydown', function (event) {
        var key = event.key.toLowerCase();
        if (isAnyModalOpen()) {
          if (event.code === 'Space' || key === ' ') {
            event.preventDefault();
          }
          return;
        }
        var isMovementKey =
          key === 'arrowup' ||
          key === 'arrowdown' ||
          key === 'arrowleft' ||
          key === 'arrowright' ||
          key === 'w' ||
          key === 'a' ||
          key === 's' ||
          key === 'd';

        if (event.code === 'Space' || key === ' ') {
          event.preventDefault();
          startGame();
          return;
        }

        if (isMovementKey) {
          event.preventDefault();
        }

        if (key === 'arrowup' || key === 'w') setDirection({ x: 0, y: -1 });
        if (key === 'arrowdown' || key === 's') setDirection({ x: 0, y: 1 });
        if (key === 'arrowleft' || key === 'a') setDirection({ x: -1, y: 0 });
        if (key === 'arrowright' || key === 'd') setDirection({ x: 1, y: 0 });
      });

      var mobileButtons = document.querySelectorAll('[data-mobile-dir]');
      mobileButtons.forEach(function (button) {
        var handlePress = function (event) {
          event.preventDefault();
          var dir = directionFromName(button.getAttribute('data-mobile-dir'));
          if (dir) setDirection(dir);
        };
        button.addEventListener('touchstart', handlePress, { passive: false });
        button.addEventListener('mousedown', handlePress);
        button.addEventListener('click', handlePress);
      });

      var mobileStartButton = document.querySelector('[data-mobile-start]');
      if (mobileStartButton) {
        var startPress = function (event) {
          event.preventDefault();
          startGame();
        };
        mobileStartButton.addEventListener('touchstart', startPress, { passive: false });
        mobileStartButton.addEventListener('mousedown', startPress);
        mobileStartButton.addEventListener('click', startPress);
      }

      async function insertScore(playerName, playerScore, roundMs) {
        if (!supabaseClient) {
          return { error: 'Supabase is not configured in config.js.' };
        }

        var functionResult = await supabaseClient.functions.invoke(snakeSubmitFunctionName(), {
          body: {
            name: playerName,
            score: playerScore,
            elapsedMs: Math.round(roundMs)
          }
        });

        if (functionResult.error) {
          var invokeMessage = functionResult.error.message || String(functionResult.error);
          var context = functionResult.error.context;
          if (context) {
            try {
              var contextClone = context.clone ? context.clone() : null;
              var contextBody = contextClone ? await contextClone.json() : await context.json();
              if (contextBody && contextBody.error) {
                invokeMessage = contextBody.error;
              }
            } catch (_jsonError) {
              try {
                var contextText = await context.text();
                if (contextText) {
                  invokeMessage = contextText;
                }
              } catch (_textError) {
                // keep default message
              }
            }
          }
          return { error: invokeMessage };
        }

        if (functionResult.data && functionResult.data.error) {
          return { error: functionResult.data.error };
        }

        return { error: null };
      }

      async function fetchLeaderboard() {
        if (!supabaseClient) {
          return { data: [], error: 'Supabase is not configured in config.js.' };
        }

        var tableName = leaderboardTable();
        var fullQuery = await supabaseClient
          .from(tableName)
          .select('name,score,elapsed_ms,created_at')
          .order('score', { ascending: false })
          .order('elapsed_ms', { ascending: true })
          .limit(LEADERBOARD_LIMIT);

        if (!fullQuery.error) {
          return { data: fullQuery.data || [], error: null };
        }

        var fallbackQuery = await supabaseClient
          .from(tableName)
          .select('name,score,created_at')
          .order('score', { ascending: false })
          .limit(LEADERBOARD_LIMIT);

        return {
          data: fallbackQuery.data || [],
          error: fallbackQuery.error ? fallbackQuery.error.message : fullQuery.error.message
        };
      }

      function renderLeaderboard(rows) {
        leaderboardList.innerHTML = '';

        if (!rows.length) {
          var emptyItem = document.createElement('li');
          emptyItem.textContent = 'No scores yet.';
          leaderboardList.appendChild(emptyItem);
          return;
        }

        rows.forEach(function (row, index) {
          var item = document.createElement('li');
          var left = document.createElement('span');
          var nameText = document.createElement('span');
          var medal = document.createElement('span');
          var right = document.createElement('span');
          var medals = ['🥇', '🥈', '🥉'];
          var scoreValue = typeof row.score === 'number' ? row.score : Number(row.score) || 0;
          var elapsedText = typeof row.elapsed_ms === 'number' ? formatElapsed(row.elapsed_ms) : null;
          var dateText = formatLeaderboardDate(row.created_at);
          var suffixParts = [];
          if (elapsedText) suffixParts.push(elapsedText);
          if (dateText) suffixParts.push(dateText);
          left.className = 'snake-leader-name';
          medal.className = 'snake-leader-medal';
          medal.textContent = medals[index] || '';
          nameText.textContent = row.name || 'Unknown';
          if (medal.textContent) {
            left.appendChild(medal);
          }
          left.appendChild(nameText);
          right.textContent = scoreValue + ' pts' + (suffixParts.length ? ' | ' + suffixParts.join(' | ') : '');
          item.appendChild(left);
          item.appendChild(right);
          leaderboardList.appendChild(item);
        });
      }

      nameForm.addEventListener('submit', async function (event) {
        event.preventDefault();
        if (submitScoreButton.disabled) return;

        try {
          var playerName = cleanName(playerNameInput.value);
          if (!isValidName(playerName)) {
            nameError.textContent = 'Use 2-20 characters: letters, numbers, space, . _ -';
            return;
          }

          submitScoreButton.disabled = true;
          nameError.textContent = 'Submitting...';

          var insertResult = await insertScore(playerName, score, elapsedMs);
          if (insertResult.error) {
            nameError.textContent = 'Could not save score: ' + insertResult.error;
            return;
          }

          var leaderboardResult = await fetchLeaderboard();
          renderLeaderboard(leaderboardResult.data);
          leaderboardStatus.textContent = leaderboardResult.error ? ('Could not fully load leaderboard: ' + leaderboardResult.error) : '';

          nameModal.hidden = true;
          leaderboardModal.hidden = false;
          statusText.textContent = 'Score submitted. View leaderboard below.';
          nameError.textContent = '';
        } catch (err) {
          var message = err && err.message ? err.message : String(err);
          nameError.textContent = 'Unexpected error: ' + message;
          console.error('Snake submit failed:', err);
        } finally {
          submitScoreButton.disabled = false;
        }
      });

      playAgainButton.addEventListener('click', function () {
        resetGameState();
        drawBoard();
        statusText.textContent = 'Press Space Bar to Start.';
      });

      supabaseClient = initializeSupabase();
      resetGameState();
      drawBoard();
      rafId = requestAnimationFrame(gameLoop);

      window.addEventListener('beforeunload', function () {
        if (rafId) cancelAnimationFrame(rafId);
      });
    })();
  </script>
</body>
</html>
